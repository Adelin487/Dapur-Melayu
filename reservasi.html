<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Reservasi Meja | Dapur Melayu</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <section class="reservasi-section">

            <div class="container">


                <div class="menu-heading">

                    <p>Pesan Tempat</p>

                    <h2 class="s-head">
                        Reservasi Meja
                    </h2>

                </div>


                <div class="reservasi-form">
                    <form>
                        <label>
                            Nama Lengkap
                        </label>

                        <input type="text" 
                        placeholder="Masukkan nama Anda">

                        <label>
                            Nomor Telepon
                        </label>

                        <input type="text" 
                        placeholder="08xxxxxxxxxx">

                        <label>
                            Tanggal Reservasi
                        </label>

                        <input type="date">

                        <label>
                            Jumlah Orang
                        </label>

                        <input type="number" 
                        placeholder="Jumlah tamu">

                        <label>
                            Jam Reservasi
                        </label>

                        <select>

                            <option>
                                10.00
                            </option>

                            <option>
                                11.00
                            </option>

                            <option>
                                13.00
                            </option>

                            <option>
                                14.00
                            </option>

                            <option>
                                15.00
                            </option>

                            <option>
                                16.00
                            </option>

                            <option>
                                17.00
                            </option>

                            <option>
                                18.00
                            </option>

                            <option>
                                19.00
                            </option>

                            <option>
                                20.00
                            </option>

                            <option>
                                21.00
                            </option>

                        </select>

                        <label>
                            Catatan
                        </label>

                        <textarea 
                        placeholder="Tambahkan permintaan khusus">
                        </textarea>

                        <button class="btn btn-solid">
                            Kirim Reservasi
                        </button>

                        <a href="index.html" class="btn btn-back">
                            Kembali ke Beranda
                        </a>
                    </form>
                </div>
            </div>
        </section>
    </body>
</html>
